name: Cypress E2E Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:node12.16.1-chrome80-ff73
      options: --user 1001
    steps:
      - uses: actions/checkout@v3.1.0
      - uses: cypress-io/github-action@v4.2.0
        with:
          browser: firefox
          build: yarn build
          start: yarn start
          wait-on: "http://localhost:3000"
