name: Cypress E2E Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3.1.0
      - name: Cypress run
        uses: cypress-io/github-action@v4.2.0
        with:
          browser: edge
          build: yarn build
          start: yarn start
          wait-on: "http://localhost:3000"
